server:
  port: 8080
  error:
    include-stacktrace: always
    include-exception: true


spring:
  # ==================== MySQL ====================
  datasource:
    url: jdbc:mysql://localhost:3306/poll?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: gaoda00nb
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 1
      # 连接池配置（可选，不写就用默认值）
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ==================== MyBatis Plus ====================
mybatis-plus:
  # 实体类包路径
  type-aliases-package: org.yjx.pollpojo.entity
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 控制台打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增
      id-type: auto
      # 逻辑删除字段（用 status 代替，这里不用 MyBatis Plus 自带的逻辑删除）
      # logic-delete-field: deleted

# ==================== 日志 ====================
logging:
  level:
    # 项目自己的包用 debug 级别，方便调试
    org.yjx: debug
    # MyBatis 的 mapper 接口日 志，能看到 SQL 参数
    org.yjx.pollservice.mapper: debug
    org.springdoc: debug



